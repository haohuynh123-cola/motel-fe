services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: frontend
    env_file:
      - .env
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/ssl/cloudflare:/etc/ssl/cloudflare:ro
    networks:
      - tro-go-network
    restart: always

networks:
  tro-go-network:
    external: true
