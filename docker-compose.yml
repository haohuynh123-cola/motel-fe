services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tro_go_frontend
    ports:
      - "80:80"
      - "443:443"
    env_file:
      - .env
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/ssl/cloudflare:/etc/ssl/cloudflare
    restart: always
