server {
    listen 80;
    listen 443 ssl;
    server_name motel.codetoolkit.org;

    # Chứng chỉ SSL
    ssl_certificate /etc/ssl/cloudflare/codetoolkit/origin.pem;
    ssl_certificate_key /etc/ssl/cloudflare/codetoolkit/private.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    root /usr/share/nginx/html;
    index index.html;

    # Quan trọng: KHÔNG dùng 'return 301' ở đây để tránh loop với Gateway

    location / {
        try_files $uri $uri/ /index.html;
    }

    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg)$ {
        expires 1y;
        add_header Cache-Control "public, no-transform";
    }
}
